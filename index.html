<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>


<title>
Tong Garden Running
</title>


<style>

body{

background:#001F5B;

font-family:Arial;

text-align:center;

color:#D4AF37;

padding:20px;

}


.box{

background:white;

border-radius:20px;

padding:25px;

max-width:400px;

margin:auto;

color:#001F5B;

}


h1{

color:#D4AF37;

}


.reward{

text-align:left;

font-size:18px;

margin:15px;

}


button{

background:#D4AF37;

color:#001F5B;

border:none;

padding:15px;

width:90%;

border-radius:30px;

font-size:18px;

font-weight:bold;

}


button:hover{

opacity:.8;

}


#status{

color:#D4AF37;

}


</style>


</head>


<body>


<h1>
🏃 Tong Garden Running
</h1>


<div id="status">
กำลัง Login LINE...
</div>


<div class="box">


<h2>
เลือกระยะทาง
</h2>



<div class="reward">

<input type="radio" name="km" value="3">

3 KM  
<br>
🎁 ดีลักซ์คอกเทลนัท

</div>



<div class="reward">

<input type="radio" name="km" value="5">

5 KM  
<br>
🎁 เกาลัดอบแบบแกะเปลือก

</div>



<div class="reward">

<input type="radio" name="km" value="7">

7 KM  
<br>
🎁 ฮาร์ทตี้มิกซ์

</div>



<div class="reward">

<input type="radio" name="km" value="10">

10 KM  
<br>
🎁 เดลี่แพ็กถุงใหญ่

</div>



<br>


<button onclick="submitReward()">

🎁 รับโปรโมชั่น

</button>


</div>



<script>


let userId="";

let displayName="";


// เปลี่ยนเป็น URL Web App ของ GAS

const API_URL =
"https://script.google.com/macros/s/AKfycbwbUyRN_gx1zHWVu2VfyfKOn7smWr7CMsTkUHKPCcaQTQ7mJyL7Q14DqtbfyKIdi7Rkxg/exec";



// สาขา ส่งมาจาก QR

const branch =
new URLSearchParams(location.search)
.get("branch");



async function main(){


await liff.init({

liffId:"2010718191-p2tclQlw"

});



if(!liff.isLoggedIn()){

liff.login();

return;

}



const profile =
await liff.getProfile();



userId =
profile.userId;


displayName =
profile.displayName;



document.getElementById("status").innerHTML=

"สวัสดี "+displayName;



}



async function submitReward(){


let km =
document.querySelector(
'input[name="km"]:checked'
);



if(!km){

alert("กรุณาเลือกระยะทาง");

return;

}



let data={


userId:userId,

name:displayName,

km:km.value,

branch:branch || "MAIN"


};



fetch(API_URL,{

method:"POST",

body:JSON.stringify(data)

})


.then(r=>r.json())


.then(result=>{


alert(result.message);


});


}



main();



</script>


</body>

</html>
