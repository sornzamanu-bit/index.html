<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>


<title>
Tong Garden Running
</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

background:#002B5B;

font-family:
"Arial",
"Tahoma",
sans-serif;

color:#ffffff;

padding:20px;

}


.header{

text-align:center;

margin-bottom:25px;

}


.logo{

font-size:32px;

font-weight:bold;

letter-spacing:1px;

color:#ffffff;

}


.subtitle{

font-size:16px;

color:#D4AF37;

margin-top:8px;

}



#status{

background:rgba(255,255,255,0.1);

padding:12px;

border-radius:10px;

text-align:center;

margin-bottom:20px;

color:#ffffff;

}



.box{

background:#ffffff;

max-width:430px;

margin:auto;

border-radius:20px;

padding:25px;

box-shadow:
0 8px 20px rgba(0,0,0,0.25);

color:#002B5B;

}



h2{

text-align:center;

color:#002B5B;

font-size:22px;

margin-bottom:20px;

}



.reward{


display:flex;

align-items:center;

gap:15px;

padding:16px;

margin:12px 0;

border-radius:12px;

border:1px solid #D9E2EC;

background:#F7F9FC;

transition:.2s;


}



.reward:hover{

border-color:#002B5B;

}



.reward input{


width:22px;

height:22px;

accent-color:#002B5B;

}



.reward label{


font-size:17px;

font-weight:bold;

color:#002B5B;

cursor:pointer;

}



.km{


color:#D4AF37;

font-size:20px;

font-weight:bold;

}



button{


margin-top:25px;

width:100%;

padding:16px;

border-radius:12px;

border:none;

background:#002B5B;

color:#D4AF37;

font-size:18px;

font-weight:bold;

border:2px solid #D4AF37;

cursor:pointer;


}


button:active{

opacity:.85;

}



.footer{

text-align:center;

margin-top:25px;

font-size:13px;

color:#D9E2EC;

}



</style>


</head>



<body>


<h1>
Tong Garden Running
</h1>



<div id="status">
กำลัง Login LINE...
</div>




<div class="box">


<h2>
เลือกระยะทาง
</h2>



<div class="reward">


<input 
type="radio"
id="km3"
name="km"
value="3">


<label for="km3">

3KM ดีลักซ์คอกเทลนัท

</label>


</div>




<div class="reward">


<input 
type="radio"
id="km5"
name="km"
value="5">


<label for="km5">

5KM เกาลัดอบแบบแกะเปลือก

</label>


</div>




<div class="reward">


<input 
type="radio"
id="km7"
name="km"
value="7">


<label for="km7">

7KM ฮาร์ทตี้มิกซ์

</label>


</div>




<div class="reward">


<input 
type="radio"
id="km10"
name="km"
value="10">


<label for="km10">

10KM เดลี่แพ็กถุงใหญ่

</label>


</div>




<button onclick="submitReward()">

🎁 รับโปรโมชั่น

</button>



</div>





<script>


let userId="";

let displayName="";



// Google Apps Script Web App URL

const API_URL =

"https://script.google.com/macros/s/AKfycbyHFLwT4a9RQ_UjDWH_uM9UZawAaJjK3pW6gbuwAlHVWcu4mVUG0Bj6EVy-HmV7_D2Zzw/exec";




// LIFF ID

const LIFF_ID =

"2010731108-0cWdzkDD";





async function main(){


try{


await liff.init({

liffId:LIFF_ID

});



if(!liff.isLoggedIn()){


liff.login();

return;


}




const profile =

await liff.getProfile();



userId = profile.userId;


displayName = profile.displayName;



document.getElementById("status").innerHTML =

"สวัสดี "+displayName;



}

catch(err){


document.getElementById("status").innerHTML=

"❌ LINE Login Error";


console.log(err);


}


}





async function submitReward(){



let km =

document.querySelector(

'input[name="km"]:checked'

);



if(!km){


alert("กรุณาเลือกระยะทาง");


return;


}




if(!userId){


alert("LINE ยังไม่ Login");


return;


}





let data={


userId:userId,

name:displayName,

km:km.value


};





fetch(API_URL,{


method:"POST",


body:JSON.stringify(data)


})



.then(response=>response.json())


.then(result=>{


alert(result.message);


})



.catch(error=>{


alert("เกิดข้อผิดพลาด");


console.log(error);


});



}




main();



</script>


</body>

</html>
