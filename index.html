<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" 
content="width=device-width,initial-scale=1">


<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>


<title>
Tong Garden Running
</title>


</head>


<body>


<h2>
Tong Garden Running
</h2>


<div id="status">
กำลัง Login LINE...
</div>



<script>


const LIFF_ID =
"2010718191-p2tclQlw";



async function startLIFF(){


try{


await liff.init({

liffId: LIFF_ID

});



if(!liff.isLoggedIn()){


document.getElementById("status")
.innerHTML =
"กำลังเปิด LINE Login...";


liff.login();


return;


}



const profile =
await liff.getProfile();



document.getElementById("status")
.innerHTML =
"Login สำเร็จ<br>"+
profile.displayName;



}

catch(e){


document.getElementById("status")
.innerHTML =
"ERROR : "+e.message;


}



}


startLIFF();


</script>


</body>

</html>
