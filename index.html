<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>


<title>
Tong Garden Running
</title>


<style>


body{

background:#001F5B;

font-family:Arial,sans-serif;

text-align:center;

color:#D4AF37;

padding:20px;

}



h1{

color:#D4AF37;

}



#status{

margin-bottom:20px;

font-size:18px;

color:#D4AF37;

}



.box{


background:white;

border-radius:20px;

padding:25px;

max-width:420px;

margin:auto;

color:#001F5B;


}



h2{

color:#001F5B;

}




.reward{


display:flex;

align-items:center;

gap:12px;

padding:15px;

margin:12px 0;

border-radius:15px;

border:2px solid #D4AF37;

font-size:17px;

font-weight:bold;


}



.reward:nth-child(even){


background:#001F5B;

color:#D4AF37;


}



.reward:nth-child(odd){


background:#D4AF37;

color:#001F5B;


}



.reward input{


width:22px;

height:22px;

cursor:pointer;


}



.reward label{


cursor:pointer;

text-align:left;

flex:1;


}



button{


margin-top:20px;

background:#001F5B;

color:#D4AF37;

border:3px solid #D4AF37;

padding:15px;

width:90%;

border-radius:30px;

font-size:18px;

font-weight:bold;

cursor:pointer;


}



button:hover{


background:#D4AF37;

color:#001F5B;


}



</style>


</head>



<body>


<h1>
🏃 Tong Garden Running
</h1>



<div id="status">
กำลัง Login LINE...
</div>




<div class="box">


<h2>
เลือกระยะทาง
</h2>



<div class="reward">


<input 
type="radio"
id="km3"
name="km"
value="3">


<label for="km3">

3 KM 🎁 ดีลักซ์คอกเทลนัท

</label>


</div>




<div class="reward">


<input 
type="radio"
id="km5"
name="km"
value="5">


<label for="km5">

5 KM 🎁 เกาลัดอบแบบแกะเปลือก

</label>


</div>




<div class="reward">


<input 
type="radio"
id="km7"
name="km"
value="7">


<label for="km7">

7 KM 🎁 ฮาร์ทตี้มิกซ์

</label>


</div>




<div class="reward">


<input 
type="radio"
id="km10"
name="km"
value="10">


<label for="km10">

10 KM 🎁 เดลี่แพ็กถุงใหญ่

</label>


</div>




<button onclick="submitReward()">

🎁 รับโปรโมชั่น

</button>



</div>





<script>


let userId="";

let displayName="";



// Google Apps Script Web App URL

const API_URL =

"https://script.google.com/macros/s/AKfycbwOEDtWIxmB_n9T8w2QcTFm7W4EpKzGjdKW9sgaOhSYJ9qBMlgaClbAEMR9XmY7Rmr0rg/exec";




// LIFF ID

const LIFF_ID =

"2010718191-p2tclQlw";





async function main(){


try{


await liff.init({

liffId:LIFF_ID

});



if(!liff.isLoggedIn()){


liff.login();

return;


}




const profile =

await liff.getProfile();



userId = profile.userId;


displayName = profile.displayName;



document.getElementById("status").innerHTML =

"สวัสดี "+displayName;



}

catch(err){


document.getElementById("status").innerHTML=

"❌ LINE Login Error";


console.log(err);


}


}





async function submitReward(){



let km =

document.querySelector(

'input[name="km"]:checked'

);



if(!km){


alert("กรุณาเลือกระยะทาง");


return;


}




if(!userId){


alert("LINE ยังไม่ Login");


return;


}





let data={


userId:userId,

name:displayName,

km:km.value


};





fetch(API_URL,{


method:"POST",


body:JSON.stringify(data)


})



.then(response=>response.json())


.then(result=>{


alert(result.message);


})



.catch(error=>{


alert("เกิดข้อผิดพลาด");


console.log(error);


});



}




main();



</script>


</body>

</html>
