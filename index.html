<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">


<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>


<title>
Tong Garden Running
</title>


<style>

body{

font-family:Arial;
background:#fff4e6;
text-align:center;
padding:20px;

}


.box{

background:white;
padding:25px;
border-radius:20px;

}


input{

font-size:20px;
padding:10px;
width:80%;

}


button{

margin-top:20px;
padding:15px 30px;
font-size:18px;
background:#8B4513;
color:white;
border:0;
border-radius:10px;

}


</style>


</head>


<body>


<div class="box">


<h2>
🏃 Tong Garden Running
</h2>



<div id="user">
กำลัง Login LINE...
</div>



<br>


<input
id="km"
type="number"
placeholder="ใส่ระยะ KM"
/>


<br>


<button onclick="receive()">

🎁 รับโปรโมชั่น

</button>



<h3 id="result"></h3>



</div>



<script>

const LIFF_ID = "2010718191-p2tclQlw";


async function initLIFF() {
    try {

        await liff.init({
            liffId: "2010718191-p2tclQlw"
        });

        if (!liff.isLoggedIn()) {
            liff.login({
                redirectUri: window.location.href
            });
            return;
        }

        const profile = await liff.getProfile();

        document.getElementById("user").innerHTML =
            "✅ " + profile.displayName;

    } catch (err) {

        document.getElementById("user").innerHTML =
            err.toString();

        console.error(err);

    }
}



initLIFF();

async function receive() {

    if (!liff.isLoggedIn()) {
        alert("กรุณา Login LINE");
        return;
    }

    const profile = await liff.getProfile();

    const km = document.getElementById("km").value;

    if (!km) {
        alert("กรุณากรอกระยะ KM");
        return;
    }

    const response = await fetch(
        "https://script.google.com/macros/s/AKfycbzBWLIQojruLgPmUUchEX6NikAzwGRjzCNREuBn58X0oB4jEHG35two1csCOaZ0TcIMzA/exec",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userId: profile.userId,
                name: profile.displayName,
                km: km
            })
        }
    );

    const result = await response.json();

    if (result.success) {
        document.getElementById("result").innerHTML =
            "🎉 ได้รับ " + result.reward;
    } else {
        document.getElementById("result").innerHTML =
            result.message;
    }
}


</script>


</body>


</html>
